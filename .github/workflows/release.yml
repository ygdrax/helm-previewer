name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build'
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.release_tag || github.ref }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        enable-cache: true

    - name: Install dependencies
      run: |
        uv sync --group dev --group build

    - name: Run quality checks
      run: |
        uv run ruff check src/ tests/
        uv run ruff format --check src/ tests/
        uv run mypy src/helm_previewer
        uv run pytest tests/ -v

    - name: Build package
      run: |
        uv run python -m build

    - name: Check package
      run: |
        uv run twine check dist/*

    - name: Generate checksums
      run: |
        cd dist
        sha256sum * > checksums.txt
        ls -la

    - name: Upload artifacts to release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/*.whl
          dist/*.tar.gz
          dist/checksums.txt
        tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
        body: |
          ## Helm Chart Previewer ${{ github.event.inputs.release_tag || github.ref_name }}

          ### Installation

          **From GitHub Release:**
          ```bash
          # Download the wheel file
          pip install https://github.com/ygdrax/helm-previewer/releases/download/${{ github.event.inputs.release_tag || github.ref_name }}/helm_previewer-*-py3-none-any.whl
          ```

          **From source:**
          ```bash
          # Download and extract the source
          curl -L https://github.com/ygdrax/helm-previewer/releases/download/${{ github.event.inputs.release_tag || github.ref_name }}/helm_previewer-*.tar.gz | tar -xz
          cd helm_previewer-*
          pip install .
          ```

          ### Usage
          ```bash
          helm-previewer parse /path/to/helm/chart
          helm-previewer parse . --output report.html --verbose
          ```

          ### Files
          - `helm_previewer-*-py3-none-any.whl` - Python wheel (recommended)
          - `helm_previewer-*.tar.gz` - Source distribution
          - `checksums.txt` - SHA256 checksums for verification
        draft: false
        prerelease: false
